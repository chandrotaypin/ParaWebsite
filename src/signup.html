<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            sora: ['Sora', 'sans-serif'],
          },
          keyframes: {
            floatAnim: {
              '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
              '50%':       { transform: 'translateY(-20px) rotate(5deg)' },
            },
          },
          animation: {
            float1: 'floatAnim 8s ease-in-out infinite',
            float2: 'floatAnim 8s ease-in-out 2s infinite',
            float3: 'floatAnim 8s ease-in-out 4s infinite',
          },
        },
      },
    }
  </script>
</head>
<body class="font-sans bg-[#f0f4ff] min-h-screen">

  <!-- SIGNUP SECTION -->
  <div class="relative min-h-screen flex items-center justify-center px-4 py-16 overflow-hidden bg-gradient-to-br from-blue-100 via-sky-100 to-blue-200">

    <!-- Background image overlay -->
    <div class="absolute inset-0 bg-[url('./images/loginbg.jpeg')] bg-cover bg-center opacity-40"></div>

    <!-- Signup Card -->
    <div class="relative z-10 w-full max-w-md">
      <div class="bg-white/85 backdrop-blur-xl border border-white/90 rounded-2xl shadow-2xl p-8 md:p-10">

        <!-- Header -->
        <div class="text-center mb-8">
          <h1 class="font-sora text-2xl font-black text-gray-900">Create an account</h1>
          <p class="text-gray-500 text-sm mt-1">Join PARA! and start navigating the city.</p>
        </div>

        <!-- Form -->
        <div class="space-y-4">

          <!-- Full Name -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Full name</label>
            <input
              id="name-input"
              type="text"
              placeholder="Juan Dela Cruz"
              class="w-full px-4 py-3 rounded-xl text-sm text-gray-800 placeholder-gray-400 bg-[#f8faff] border-[1.5px] border-slate-200 hover:border-blue-300 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-[3px] focus:ring-blue-500/15 transition-all duration-200"
            >
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email address</label>
            <input
              id="email-input"
              type="email"
              placeholder="you@example.com"
              class="w-full px-4 py-3 rounded-xl text-sm text-gray-800 placeholder-gray-400 bg-[#f8faff] border-[1.5px] border-slate-200 hover:border-blue-300 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-[3px] focus:ring-blue-500/15 transition-all duration-200"
            >
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
            <div class="relative">
              <input
                id="password-input"
                type="password"
                placeholder="Create a password"
                class="w-full px-4 pr-11 py-3 rounded-xl text-sm text-gray-800 placeholder-gray-400 bg-[#f8faff] border-[1.5px] border-slate-200 hover:border-blue-300 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-[3px] focus:ring-blue-500/15 transition-all duration-200"
              >
              <button
                onclick="togglePassword('password-input', 'eye-icon-1')"
                type="button"
                class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 hover:scale-110 transition-all duration-150 cursor-pointer"
              >
                <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm password</label>
            <div class="relative">
              <input
                id="confirm-input"
                type="password"
                placeholder="Repeat your password"
                class="w-full px-4 pr-11 py-3 rounded-xl text-sm text-gray-800 placeholder-gray-400 bg-[#f8faff] border-[1.5px] border-slate-200 hover:border-blue-300 focus:border-blue-500 focus:bg-white focus:outline-none focus:ring-[3px] focus:ring-blue-500/15 transition-all duration-200"
              >
              <button
                onclick="togglePassword('confirm-input', 'eye-icon-2')"
                type="button"
                class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 hover:scale-110 transition-all duration-150 cursor-pointer"
              >
                <svg id="eye-icon-2" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Terms -->
          <div class="flex items-start gap-2">
            <input
              id="terms"
              type="checkbox"
              class="w-4 h-4 mt-0.5 rounded border-gray-300 accent-blue-500 cursor-pointer hover:scale-110 transition-transform duration-150"
            >
            <label for="terms" class="text-sm text-gray-600 cursor-pointer select-none leading-relaxed">
              I agree to the
              <a href="#" class="text-blue-500 font-semibold hover:text-blue-700 transition-colors duration-200">Terms of Service</a>
              and
              <a href="#" class="text-blue-500 font-semibold hover:text-blue-700 transition-colors duration-200">Privacy Policy</a>
            </label>
          </div>

          <!-- Sign Up Button -->
          <button class="w-full mt-1 py-3.5 rounded-xl text-sm font-bold text-white tracking-wide bg-blue-500 hover:bg-blue-700 hover:-translate-y-0.5 hover:shadow-[0_10px_28px_rgba(59,130,246,0.45)] active:translate-y-0 active:shadow-[0_4px_12px_rgba(59,130,246,0.3)] transition-all duration-150 cursor-pointer">
            CREATE ACCOUNT
          </button>

          <!-- Divider -->
          <div class="flex items-center gap-3 text-xs text-gray-400 font-medium">
            <span class="flex-1 h-px bg-slate-200"></span>
            <span>OR SIGN UP WITH</span>
            <span class="flex-1 h-px bg-slate-200"></span>
          </div>

          <!-- Social Buttons -->
          <div class="grid grid-cols-2 gap-3">
            <button class="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-medium text-gray-700 bg-white border-[1.5px] border-slate-200 hover:border-blue-300 hover:shadow-[0_4px_14px_rgba(59,130,246,0.12)] hover:-translate-y-0.5 active:translate-y-0 transition-all duration-150 cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button class="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-medium text-gray-700 bg-white border-[1.5px] border-slate-200 hover:border-blue-300 hover:shadow-[0_4px_14px_rgba(59,130,246,0.12)] hover:-translate-y-0.5 active:translate-y-0 transition-all duration-150 cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
              Facebook
            </button>
          </div>

        </div>

        <!-- Login link -->
        <p class="text-center text-sm text-gray-500 mt-6">
          Already have an account?
          <a href="./login.html" class="text-blue-500 font-semibold hover:text-blue-700 transition-colors duration-200">Log in</a>
        </p>

      </div>
    </div>

  </div>

  <script>
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }
  </script>

</body>
</html>
